name: "CI: Deep"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  workflow_dispatch:
    inputs:
      integrationFuzzRuns:
        default: "10000"
        description: "Integration: number of fuzz runs."
        required: false
      invariantRuns:
        default: "1000"
        description: "Invariant runs: number of sequences of function calls generated and run."
        required: false
      invariantDepth:
        default: "200"
        description: "Invariant depth: number of function calls made in a given run."
        required: false
  schedule:
    - cron: "0 3 1 * *" # at 3:00 AM UTC on the 1st of every month

jobs:
  build:
    name: "${{ matrix.module }} / Build"
    strategy:
      matrix:
        module: [airdrops, bob, flow, lockup, utils]
    uses: "sablier-labs/gha-utils/.github/workflows/forge-build.yml@main"
    with:
      cache-path: &cache-path |
        ${{ matrix.module }}/cache
        ${{ matrix.module }}/node_modules
        ${{ matrix.module }}/out
        ${{ matrix.module }}/out-optimized
      foundry-version: &foundry-version "v1.5.1"
      name: "Build"
      working-directory: ${{ matrix.module }}

  test-fuzz:
    name: "${{ matrix.module }} / Fuzz"
    needs: ["build"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: airdrops
            match-path: "tests/integration/fuzz/**/*.sol"
          - module: bob
            match-path: "tests/*/integration/fuzz/**/*.sol"
          - module: flow
            match-path: "tests/integration/fuzz/**/*.sol"
          - module: lockup
            match-path: "tests/integration/fuzz/**/*.sol"
          - module: utils
            match-path: "tests/integration/fuzz/**/*.sol"
    uses: "sablier-labs/gha-utils/.github/workflows/forge-test.yml@main"
    with:
      cache-path: *cache-path
      foundry-fuzz-runs: ${{ fromJSON(inputs.integrationFuzzRuns || '10000') }}
      foundry-profile: "test-optimized"
      foundry-version: *foundry-version
      match-path: ${{ matrix.match-path }}
      name: "Fuzz"
      working-directory: ${{ matrix.module }}

  test-invariant:
    name: "${{ matrix.module }} / Invariant"
    needs: ["build"]
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: airdrops
            match-path: "tests/invariant/**/*.sol"
          - module: bob
            match-path: "tests/*/invariant/**/*.sol"
          - module: flow
            match-path: "tests/invariant/**/*.sol"
          - module: lockup
            match-path: "tests/invariant/**/*.sol"
          - module: utils
            match-path: "tests/invariant/**/*.sol"
    uses: "sablier-labs/gha-utils/.github/workflows/forge-test.yml@main"
    with:
      cache-path: *cache-path
      foundry-invariant-depth: ${{ fromJSON(inputs.invariantDepth || '200') }}
      foundry-invariant-runs: ${{ fromJSON(inputs.invariantRuns || '1000') }}
      foundry-profile: "test-optimized"
      foundry-version: *foundry-version
      match-path: ${{ matrix.match-path }}
      name: "Invariant"
      working-directory: ${{ matrix.module }}
